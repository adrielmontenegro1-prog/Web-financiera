<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Studio | Panel Financiero Personal</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --card: rgba(255, 255, 255, 0.82);
        --card-solid: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: rgba(17, 24, 39, 0.08);
        --blue: #007aff;
        --green: #34c759;
        --red: #ff3b30;
        --yellow: #ffcc00;
        --shadow: 0 24px 80px rgba(17, 24, 39, 0.08);
      }

      body.dark {
        --bg: #0f172a;
        --card: rgba(17, 24, 39, 0.82);
        --card-solid: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --line: rgba(148, 163, 184, 0.16);
        --blue: #38bdf8;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #ffcc00;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      button, input, select, textarea { font: inherit; }
      button { border: 0; cursor: pointer; }
      a { color: inherit; text-decoration: none; }

      .ambient {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }
      .ambient::before,
      .ambient::after {
        content: "";
        position: absolute;
        width: 360px;
        height: 360px;
        border-radius: 999px;
        filter: blur(80px);
        opacity: 0.22;
      }
      .ambient::before { left: -80px; top: -80px; background: var(--blue); }
      .ambient::after { right: -80px; bottom: -80px; background: var(--green); }

      .layout {
        display: grid;
        grid-template-columns: 290px minmax(0, 1fr);
        gap: 22px;
        max-width: 1500px;
        margin: 0 auto;
        padding: 22px;
      }

      .sidebar {
        position: sticky;
        top: 22px;
        height: calc(100vh - 44px);
        border: 1px solid var(--line);
        background: var(--card);
        border-radius: 30px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px);
        padding: 16px;
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px;
      }
      .brand-icon {
        width: 50px;
        height: 50px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: var(--blue);
        color: white;
        box-shadow: 0 14px 35px color-mix(in srgb, var(--blue) 28%, transparent);
      }
      .brand strong { display: block; font-size: 18px; letter-spacing: 0; }
      .brand span { display: block; color: var(--muted); font-size: 12px; font-weight: 700; margin-top: 2px; }

      .nav {
        display: grid;
        gap: 7px;
        margin-top: 24px;
      }
      .nav button, .mobile-nav button {
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 18px;
        padding: 13px 14px;
        color: var(--muted);
        background: transparent;
        font-size: 14px;
        font-weight: 800;
        transition: transform 0.2s, background 0.2s, color 0.2s;
      }
      .nav button:hover, .mobile-nav button:hover { transform: translateY(-1px); background: color-mix(in srgb, var(--text) 5%, transparent); }
      .nav button.active, .mobile-nav button.active {
        background: var(--blue);
        color: white;
        box-shadow: 0 14px 34px color-mix(in srgb, var(--blue) 25%, transparent);
      }

      .sidebar-bottom {
        margin-top: auto;
        display: grid;
        gap: 10px;
      }

      .main {
        min-width: 0;
        padding-bottom: 24px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        margin: -22px -22px 22px;
        padding: 18px 22px;
        background: color-mix(in srgb, var(--bg) 82%, transparent);
        backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--line);
      }
      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .eyebrow { color: var(--blue); font-weight: 900; font-size: 13px; margin: 0; }
      h1, h2, h3, p { margin: 0; }
      h1 { font-size: clamp(28px, 4vw, 46px); line-height: 1.02; letter-spacing: 0; margin-top: 5px; }
      h2 { font-size: clamp(24px, 3vw, 34px); line-height: 1.1; }
      h3 { font-size: 18px; }
      .muted { color: var(--muted); }
      .small { font-size: 13px; line-height: 1.45; }

      .view { display: none; animation: rise 0.32s ease both; }
      .view.active { display: block; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .grid { display: grid; gap: 16px; }
      .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .grid-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }

      .panel {
        border: 1px solid var(--line);
        background: var(--card);
        border-radius: 32px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px);
        padding: 22px;
      }
      .panel + .panel, .section-space { margin-top: 16px; }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 16px;
      }
      .hero-card {
        background: var(--blue);
        color: white;
        border-radius: 30px;
        padding: 24px;
        box-shadow: 0 22px 60px color-mix(in srgb, var(--blue) 28%, transparent);
      }
      body.dark .hero-card { color: #0f172a; }
      .hero-card strong { display: block; font-size: clamp(32px, 4vw, 46px); margin-top: 16px; letter-spacing: 0; }
      .hero-card span { opacity: 0.82; font-weight: 800; }

      .stat {
        min-height: 142px;
        border-radius: 28px;
        background: var(--card-solid);
        border: 1px solid var(--line);
        padding: 17px;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .stat:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
      .stat-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }
      .stat-title { color: var(--muted); font-size: 13px; font-weight: 850; line-height: 1.25; }
      .stat-value { margin-top: 22px; font-size: clamp(20px, 2vw, 27px); font-weight: 950; overflow-wrap: anywhere; }
      .iconbox {
        width: 42px;
        height: 42px;
        border-radius: 17px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }
      .blue { color: var(--blue); background: color-mix(in srgb, var(--blue) 12%, transparent); }
      .green { color: var(--green); background: color-mix(in srgb, var(--green) 14%, transparent); }
      .red { color: var(--red); background: color-mix(in srgb, var(--red) 12%, transparent); }
      .yellow { color: #b45309; background: color-mix(in srgb, var(--yellow) 22%, transparent); }
      body.dark .yellow { color: var(--yellow); }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 12px;
        font-weight: 900;
        background: color-mix(in srgb, var(--blue) 13%, transparent);
        color: var(--blue);
      }

      .btn {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        border-radius: 17px;
        padding: 12px 15px;
        background: var(--text);
        color: var(--bg);
        font-weight: 900;
        transition: transform 0.2s, opacity 0.2s;
      }
      .btn:hover { transform: translateY(-1px); opacity: 0.94; }
      .btn.primary { background: var(--blue); color: white; }
      body.dark .btn.primary { color: #0f172a; }
      .btn.ghost { background: color-mix(in srgb, var(--text) 6%, transparent); color: var(--text); }
      .btn.danger { background: color-mix(in srgb, var(--red) 13%, transparent); color: var(--red); }

      .input, .select, .textarea {
        width: 100%;
        min-height: 43px;
        border: 1px solid transparent;
        border-radius: 16px;
        background: color-mix(in srgb, var(--text) 5%, transparent);
        color: var(--text);
        outline: none;
        padding: 10px 12px;
        font-weight: 760;
      }
      .textarea { min-height: 76px; resize: vertical; }
      .input:focus, .select:focus, .textarea:focus { border-color: var(--blue); background: var(--card-solid); }
      label { display: grid; gap: 6px; }
      label span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 900px; }
      th { color: var(--muted); font-size: 11px; text-transform: uppercase; text-align: left; padding: 0 10px; }
      td { background: color-mix(in srgb, var(--text) 4%, transparent); padding: 10px; vertical-align: middle; }
      td:first-child { border-radius: 16px 0 0 16px; }
      td:last-child { border-radius: 0 16px 16px 0; }

      .chart {
        min-height: 310px;
        position: relative;
      }
      .bars { display: grid; gap: 14px; margin-top: 18px; }
      .bar-row {
        display: grid;
        grid-template-columns: 110px 1fr 105px;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        font-weight: 850;
      }
      .track {
        height: 14px;
        background: color-mix(in srgb, var(--text) 9%, transparent);
        border-radius: 999px;
        overflow: hidden;
      }
      .fill {
        height: 100%;
        border-radius: 999px;
        background: var(--blue);
        transition: width 0.35s;
      }

      .donut-wrap {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 22px;
        align-items: center;
      }
      .donut {
        width: 230px;
        height: 230px;
        border-radius: 50%;
        background: conic-gradient(var(--blue) 0 92%, var(--yellow) 92% 96%, #38bdf8 96% 100%);
        display: grid;
        place-items: center;
        margin: auto;
      }
      .donut::after {
        content: "";
        width: 126px;
        height: 126px;
        border-radius: 50%;
        background: var(--card-solid);
      }
      .legend { display: grid; gap: 10px; }
      .legend-item { display: flex; justify-content: space-between; gap: 10px; font-size: 14px; font-weight: 850; }
      .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; margin-right: 7px; }

      .calendar {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 9px;
      }
      .weekday { color: var(--muted); font-size: 11px; font-weight: 950; text-align: center; text-transform: uppercase; }
      .day {
        min-height: 108px;
        border: 1px solid var(--line);
        border-radius: 19px;
        background: var(--card-solid);
        padding: 9px;
      }
      .day strong { font-size: 13px; }
      .event-chip {
        margin-top: 6px;
        border-radius: 9px;
        padding: 5px 7px;
        font-size: 11px;
        font-weight: 900;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        background: color-mix(in srgb, var(--blue) 14%, transparent);
        color: var(--blue);
      }
      .event-chip.paid { color: var(--green); background: color-mix(in srgb, var(--green) 15%, transparent); }
      .event-chip.overdue { color: var(--red); background: color-mix(in srgb, var(--red) 13%, transparent); }

      .alert {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        border-radius: 24px;
        padding: 15px;
        background: color-mix(in srgb, var(--text) 4%, transparent);
      }
      .alert + .alert { margin-top: 10px; }
      .alert strong { display: block; margin-bottom: 4px; }

      .card-editor {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card-solid);
        padding: 16px;
      }

      .mobile-nav {
        display: none;
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;
        z-index: 40;
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px);
        border-radius: 26px;
        padding: 8px;
        overflow-x: auto;
        gap: 6px;
      }
      .mobile-nav button {
        min-width: 74px;
        flex-direction: column;
        padding: 9px;
        font-size: 11px;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 60;
        max-width: 320px;
        border-radius: 22px;
        padding: 14px 16px;
        background: var(--text);
        color: var(--bg);
        font-weight: 850;
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition: 0.25s;
      }
      .toast.show { opacity: 1; transform: translateY(0); }

      @media (max-width: 1180px) {
        .grid-5, .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .hero, .grid-3, .grid-2 { grid-template-columns: 1fr; }
        .donut-wrap { grid-template-columns: 1fr; }
      }

      @media (max-width: 860px) {
        .layout { display: block; padding: 14px; }
        .sidebar { display: none; }
        .topbar { margin: -14px -14px 16px; padding: 14px; }
        .mobile-nav { display: flex; }
        .main { padding-bottom: 96px; }
        .panel { border-radius: 26px; padding: 16px; }
        .grid-5, .grid-4 { grid-template-columns: 1fr; }
        .topbar-inner { align-items: flex-start; }
        .desktop-only { display: none; }
        .day { min-height: 88px; padding: 7px; }
        .event-chip { font-size: 10px; padding: 4px 5px; }
      }
    </style>
  </head>
  <body>
    <div class="ambient"></div>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon" data-icon="WalletCards"></div>
          <div><strong>Finance Studio</strong><span>Apple clean finance</span></div>
        </div>
        <nav class="nav" id="sideNav"></nav>
        <div class="sidebar-bottom">
          <button class="btn ghost" id="themeBtn"><span data-icon="Moon"></span> Tema oscuro</button>
          <button class="btn danger" id="resetBtn"><span data-icon="RefreshCcw"></span> Reiniciar datos</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-inner">
            <div>
              <p class="eyebrow">Panel financiero personal</p>
              <h1>Tu dinero, claro y accionable</h1>
              <p class="muted small" style="margin-top: 8px;">Website responsive para ingresos variables, gastos, tarjetas, IRS, calendario, alertas, ahorro y reportes.</p>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;">
              <span class="pill" id="leftoverPill"></span>
              <span class="pill" id="alertsPill"></span>
            </div>
          </div>
        </header>

        <section id="dashboard" class="view active"></section>
        <section id="incomes" class="view"></section>
        <section id="movements" class="view"></section>
        <section id="calendar" class="view"></section>
        <section id="cards" class="view"></section>
        <section id="irs" class="view"></section>
        <section id="budget" class="view"></section>
        <section id="reports" class="view"></section>
        <section id="alerts" class="view"></section>
        <section id="settings" class="view"></section>
      </main>
    </div>
    <nav class="mobile-nav" id="mobileNav"></nav>
    <div class="toast" id="toast"></div>

    <script>
      const icons = {
        Home: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m3 10 9-7 9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>',
        ReceiptText: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2z"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>',
        CalendarDays: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M8 2v4M16 2v4M3 10h18"/><rect x="3" y="4" width="18" height="18" rx="2"/></svg>',
        CreditCard: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>',
        Landmark: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m3 9 9-6 9 6M4 10h16M6 10v8M10 10v8M14 10v8M18 10v8M3 21h18"/></svg>',
        Gauge: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 14l4-4"/><path d="M20.3 18a9 9 0 1 0-16.6 0"/></svg>',
        FileText: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h5"/></svg>',
        Bell: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>',
        Settings: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7.1 4l.1.1a1.7 1.7 0 0 0 1.9.3h.1A1.7 1.7 0 0 0 10 2.9V3a2 2 0 1 1 4 0v-.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1A1.7 1.7 0 0 0 21 10h0a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>',
        WalletCards: '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18M7 15h4"/></svg>',
        PiggyBank: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 5c-1.5-1-3-1-5-1H9a6 6 0 0 0-6 6v4h2l1 4h3l1-2h4l1 2h3l1-4h2v-4h-2z"/><path d="M9 8h.01M16 10h.01"/></svg>',
        CircleDollarSign: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 0 0 0 4h4a2 2 0 0 1 0 4H8M12 6v12"/></svg>',
        AlertTriangle: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m10.3 3.9-8.2 14A2 2 0 0 0 3.8 21h16.4a2 2 0 0 0 1.7-3.1l-8.2-14a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
        Moon: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>',
        RefreshCcw: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>',
        Download: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>',
        Plus: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>',
        Trash2: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4h8v2M6 6l1 16h10l1-16"/></svg>',
        CheckCircle2: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-5"/></svg>'
      };

      const nav = [
        ['dashboard', 'Dashboard', 'Home'], ['incomes', 'Ingresos', 'CircleDollarSign'], ['movements', 'Movimientos', 'ReceiptText'],
        ['calendar', 'Calendario', 'CalendarDays'], ['cards', 'Tarjetas', 'CreditCard'],
        ['irs', 'IRS', 'Landmark'], ['budget', 'Presupuesto', 'Gauge'],

      async function loadCloud() {
        try {
          const response = await fetch('/api/load', { cache: 'no-store' });
          if (!response.ok) throw new Error('No se pudo cargar la nube');
          const payload = await response.json();
          cloudEnabled = Boolean(payload.cloud);
          cloudStatus = cloudEnabled ? 'Nube conectada' : 'Local';
          if (payload.data) {
            data = { ...structuredClone(baseData), ...payload.data };
            if (!Array.isArray(data.incomes)) data.incomes = [];
            localStorage.setItem(storeKey, JSON.stringify(data));
          }
          render();
        } catch (error) {
          cloudEnabled = false;
          cloudStatus = 'Local';
          render();
        }
      }

      async function saveCloud() {
        try {
          const response = await fetch('/api/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data })
          });
          const payload = await response.json().catch(() => ({}));
          cloudEnabled = Boolean(payload.cloud && payload.saved);
          cloudStatus = cloudEnabled ? 'Guardado online' : 'Local';
          renderCloudBadges();
        } catch (error) {
          cloudEnabled = false;
          cloudStatus = 'Local';
          renderCloudBadges();
        }
      }
      function calc() {
        const currentMonth = `${today.getFullYear()}-${pad(today.getMonth() + 1)}`;
        const monthIncomes = data.incomes.filter(x => String(x.date || '').startsWith(currentMonth));
        const incomeTotal = monthIncomes.reduce((s, x) => s + Number(x.amount || 0), 0);
        const effectiveIncome = incomeTotal > 0 ? incomeTotal : Number(data.income || 0);
        const totals = {};
        data.expenses.forEach(x => totals[x.category] = (totals[x.category] || 0) + monthly(x.amount, x.frequency));
        const fixed = totals.Fijos || 0, subs = totals.Suscripciones || 0, variable = totals.Variables || 0, savings = totals.Ahorro || 0;
        const cardDebt = data.cards.reduce((s, c) => s + Number(c.balance || 0), 0);
        const cardMin = data.cards.reduce((s, c) => s + Number(c.minimum || 0), 0);
        const cardRec = data.cards.reduce((s, c) => s + Number(c.recommended || 0), 0);
        const total = fixed + subs + variable + cardMin + Number(data.irs.monthly || 0);
        const leftover = effectiveIncome - total - savings;
        const rate = effectiveIncome ? savings / effectiveIncome * 100 : 0;
        const vehicle = data.expenses.filter(x => /carro|camioneta/i.test(x.name)).reduce((s, x) => s + monthly(x.amount, x.frequency), 0);
        const leaks = [
          { name: 'Vivienda y fijos', value: fixed }, { name: 'Vehiculo', value: vehicle }, { name: 'Suscripciones', value: subs },
          { name: 'Variables', value: variable }, { name: 'Tarjetas', value: cardMin }, { name: 'IRS', value: Number(data.irs.monthly || 0) }
        ].sort((a, b) => b.value - a.value);
        const next = [...data.expenses.map(x => ({ name: x.name, amount: monthly(x.amount, x.frequency), day: x.dueDay })), ...data.cards.map(c => ({ name: c.name, amount: c.minimum, day: c.dueDay }))]
          .filter(x => dayDiff(x.day) >= 0).sort((a, b) => dayDiff(a.day) - dayDiff(b.day))[0];
        return { totals, fixed, subs, variable, savings, cardDebt, cardMin, cardRec, total, leftover, rate, vehicle, leak: leaks[0], next, incomeTotal, effectiveIncome, monthIncomes };
      }
      function alerts(m) {
        const out = [];
        data.cards.forEach(c => {
          const d = dayDiff(c.dueDay);
          if (c.balance > 0 && d < 0) out.push(['red', `${c.name} vencida`, `Pago vencio hace ${Math.abs(d)} dias.`, 'Tarjetas']);
          if (c.balance > 0 && d === 1) out.push(['red', `${c.name} vence manana`, `Pago minimo ${usd(c.minimum)}.`, 'Tarjetas']);
          if (c.balance > 0 && d >= 0 && d <= 7) out.push(['yellow', `${c.name} vence en ${d} dias`, `Fecha limite dia ${c.dueDay}.`, 'Tarjetas']);
          if (c.balance > 0 && c.minimum / c.balance < 0.02) out.push(['yellow', `${c.name}: minimo bajo`, 'El pago minimo es menor al 2% del balance.', 'Tarjetas']);
        });
        const irsD = dayDiff(data.irs.dueDay);
        if (data.irs.monthly > 0 && irsD <= 7 && irsD >= 0) out.push(['yellow', 'IRS vence pronto', `Vence en ${irsD} dias.`, 'IRS']);
        if (data.irs.monthly > 0 && irsD < 0) out.push(['red', 'IRS vencido', `Vencio hace ${Math.abs(irsD)} dias.`, 'IRS']);
        if (m.cardDebt > m.effectiveIncome * 0.3) out.push(['red', 'Deuda alta vs ingreso', 'Tarjetas superan 30% del ingreso mensual.', 'Deudas']);
        if (m.savings < m.effectiveIncome * 0.1) out.push(['yellow', 'Ahorro bajo', 'Tu ahorro esta por debajo del 10%.', 'Ahorro']);
        if (m.leftover > 0) out.push(['green', 'Sobrante disponible', `Puedes asignar ${usd(m.leftover)} entre ahorro, deuda e inversion.`, 'Flujo']);
        return out.length ? out : [['green', 'Todo tranquilo', 'No hay alertas criticas con los datos actuales.', 'Sistema']];
      }
      function insights(m) {
        const lines = [`Tu mayor gasto es ${m.leak.name.toLowerCase()} con ${usd(m.leak.value)} al mes.`, `Tus suscripciones suman ${usd(m.subs)} al mes, ${usd(m.subs * 12)} al ano.`];
        if (m.vehicle > m.effectiveIncome * 0.2) lines.push('Tu vehiculo representa un gasto alto frente al ingreso.');
        if (m.savings <= 0) lines.push('No tienes ahorro registrado.');

        if (m.leftover < 0) lines.push('Estas gastando mas de lo que entra.');
        if (m.rate < 10) lines.push('Tu ahorro esta por debajo del 10%.');
        const tips = [];
        if (m.rate < 10) tips.push('Separa ahorro apenas entra el ingreso.');
        if (m.cardDebt > m.effectiveIncome * 0.3) tips.push('Activa un plan de pago agresivo para tarjetas.');
        if (m.subs > 150) tips.push('Cancela o pausa 1 o 2 servicios.');

        if (m.variable > m.effectiveIncome * 0.2) tips.push('Pon un limite semanal para gastos variables.');
        if (m.leftover > 0) tips.push('Divide el sobrante entre ahorro, deuda e inversion.');
        return { lines, tips };
      }

          `<div class="panel section-space"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap"><h3>Gastos editables</h3><button class="btn primary" onclick="addExpense()">${icons.Plus} Nuevo gasto</button></div>
          <div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Categoria</th><th>Monto</th><th>Frecuencia</th><th>Mensual</th><th>Dia</th><th>Estado</th><th>Notas</th><th></th></tr></thead><tbody>
          ${data.expenses.map((x,i) => `<tr><td>${textInput(`expenses.${i}.name`, x.name)}</td><td>${selectInput(`expenses.${i}.category`, x.category, ['Fijos','Suscripciones','Variables','Deudas','Ahorro','IRS','Otros'])}</td><td>${numInput(`expenses.${i}.amount`, x.amount)}</td><td>${selectInput(`expenses.${i}.frequency`, x.frequency, Object.keys(freqLabels), freqLabels)}</td><td><strong>${usd(monthly(x.amount,x.frequency))}</strong></td><td>${numInput(`expenses.${i}.dueDay`, x.dueDay)}</td><td>${selectInput(`expenses.${i}.status`, x.status, ['pending','paid','overdue'], statusLabels)}</td><td>${textInput(`expenses.${i}.notes`, x.notes)}</td><td><button class="btn danger" onclick="deleteExpense(${x.id})">${icons.Trash2}</button></td></tr>`).join('')}
          </tbody></table></div></div>`;
      }

      function renderCalendar() {
        const first = new Date(today.getFullYear(), today.getMonth(), 1).getDay();
        const count = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        const days = [...Array(first).fill(null), ...Array.from({length: count}, (_, i) => i + 1)];
        const eventsByDay = {};
        data.events.forEach(e => { const d = Number(e.date.slice(-2)); eventsByDay[d] = [...(eventsByDay[d] || []), e]; });
        const upcoming = data.events.map(e => ({...e, distance: Math.ceil((new Date(e.date) - today) / 86400000)})).filter(e => e.distance >= 0 && e.distance <= 30).sort((a,b)=>a.distance-b.distance);
        calendar.innerHTML = pageTitle('Calendario financiero', 'Eventos, pagos del dia, proximos 7 dias, proximos 30 dias, estados y repeticion.') +
          `<div class="grid grid-2 section-space"><div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h3>${today.toLocaleDateString('es-US',{month:'long',year:'numeric'})}</h3><button class="btn primary" onclick="addEvent()">${icons.Plus} Evento</button></div>
          <div class="calendar section-space">${['D','L','M','M','J','V','S'].map(d=>`<div class="weekday">${d}</div>`).join('')}${days.map(d => `<div class="day">${d ? `<strong>${d}</strong>${(eventsByDay[d]||[]).slice(0,3).map(e=>`<div class="event-chip ${e.status}">${esc(e.name)}</div>`).join('')}` : ''}</div>`).join('')}</div></div>
          <div class="panel"><h3>Eventos editables</h3><div class="grid section-space">${data.events.map((e,i)=>eventEditor(e,i)).join('')}</div><h3 class="section-space">Proximos 7 dias</h3>${upcoming.filter(e=>e.distance<=7).map(miniRow).join('') || empty('No hay pagos en 7 dias.')}<h3 class="section-space">Proximos 30 dias</h3>${upcoming.map(miniRow).join('') || empty('No hay pagos en 30 dias.')}</div></div>`;
      }
      function eventEditor(e,i) {
        return `<div class="card-editor"><div class="grid grid-2">${textInput(`events.${i}.name`, e.name)}${numInput(`events.${i}.amount`, e.amount)}<input class="input" type="date" value="${e.date}" onchange="setPath('events.${i}.date', this.value)">${selectInput(`events.${i}.status`, e.status, ['pending','paid','overdue'], statusLabels)}${selectInput(`events.${i}.repeat`, e.repeat, Object.keys(freqLabels), freqLabels)}${textInput(`events.${i}.category`, e.category)}<textarea class="textarea" onchange="setPath('events.${i}.notes', this.value)">${esc(e.notes)}</textarea><button class="btn danger" onclick="deleteEvent(${e.id})">${icons.Trash2} Eliminar</button></div></div>`;
      }
      function miniRow(e) {
        return `<div class="alert"><div class="iconbox blue">${icons.CalendarDays}</div><div style="flex:1"><strong>${esc(e.name)} - ${usd(e.amount)}</strong><p class="muted small">${e.distance} dias - ${freqLabels[e.repeat] || e.repeat}</p></div></div>`;
      }
      function empty(text) { return `<div class="alert"><div><strong>${text}</strong></div></div>`; }

      function renderCards(m) {
        const highest = [...data.cards].sort((a,b)=>b.balance-a.balance)[0];
        const apr = [...data.cards].sort((a,b)=>b.apr-a.apr)[0];
        cards.innerHTML = pageTitle('Tarjetas de credito', 'Seis tarjetas con balance, banco, minimo, recomendado, APR, corte, vencimiento, estado y notas.') +
          `<div class="grid grid-5 section-space">${stat('Total deuda tarjetas', usd(m.cardDebt), 'CreditCard', 'red')}${stat('Total pagos minimos', usd(m.cardMin), 'CircleDollarSign', 'yellow')}${stat('Total recomendado', usd(m.cardRec), 'PiggyBank', 'green')}${stat('Mayor balance', highest.name, 'AlertTriangle', 'red')}${stat('Mayor interes', (apr.apr||0)+'%', 'AlertTriangle', 'yellow')}</div>
          <div class="panel section-space"><div class="grid grid-2">${data.cards.map((c,i)=>cardEditor(c,i)).join('')}</div></div>`;
      }
      function cardEditor(c,i) {
        return `<div class="card-editor"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><strong>${esc(c.name)}</strong><span class="pill">${statusLabels[c.status]}</span></div><div class="grid grid-2 section-space">
          <label><span>Nombre</span>${textInput(`cards.${i}.name`, c.name)}</label><label><span>Banco</span>${textInput(`cards.${i}.bank`, c.bank)}</label>
          <label><span>Balance</span>${numInput(`cards.${i}.balance`, c.balance)}</label><label><span>Pago minimo</span>${numInput(`cards.${i}.minimum`, c.minimum)}</label>
          <label><span>Pago recomendado</span>${numInput(`cards.${i}.recommended`, c.recommended)}</label><label><span>APR</span>${numInput(`cards.${i}.apr`, c.apr)}</label>
          <label><span>Fecha corte</span>${numInput(`cards.${i}.closingDay`, c.closingDay)}</label><label><span>Fecha limite</span>${numInput(`cards.${i}.dueDay`, c.dueDay)}</label>
          <label><span>Estado</span>${selectInput(`cards.${i}.status`, c.status, ['current','pending','late'], statusLabels)}</label><label><span>Notas</span>${textInput(`cards.${i}.notes`, c.notes)}</label>
        </div></div>`;
      }

      function renderIrs(m) {
        irs.innerHTML = pageTitle('IRS', 'Monto pendiente, pago mensual, fecha, balance restante, estado, notas y alertas.') +
          `<div class="grid grid-2 section-space"><div class="panel"><h3>Plan IRS</h3><div class="grid grid-2 section-space">
          <label><span>Monto total pendiente</span>${numInput('irs.total', data.irs.total)}</label><label><span>Pago mensual</span>${numInput('irs.monthly', data.irs.monthly)}</label>
          <label><span>Fecha pago mensual</span>${numInput('irs.dueDay', data.irs.dueDay)}</label><label><span>Balance restante</span>${numInput('irs.remaining', data.irs.remaining)}</label>
          <label><span>Estado</span>${selectInput('irs.status', data.irs.status, ['pending','paid','overdue'], statusLabels)}</label><label><span>Notas</span>${textInput('irs.notes', data.irs.notes)}</label>
          </div></div><div class="panel"><h3>Impacto</h3><div class="grid grid-2 section-space">${stat('IRS mensual', usd(data.irs.monthly), 'Landmark', 'red')}${stat('Balance restante', usd(data.irs.remaining), 'ReceiptText', 'yellow')}${stat('Ahorro mensual', usd(m.savings), 'PiggyBank', 'green')}${stat('Impacto ahorro', data.irs.monthly > m.savings ? 'Alto' : 'Manejable', 'AlertTriangle', data.irs.monthly > m.savings ? 'red' : 'green')}</div></div></div>`;
      }

      function renderBudget() {
        budget.innerHTML = pageTitle('Presupuesto mensual', 'Limites por categoria con barras verde, amarillo y rojo.') +
          `<div class="panel section-space"><div class="grid grid-2">${data.budgets.map((b,i)=>{ const r=b.limit?b.spent/b.limit:0; const tone=r>1?'red':r>.8?'yellow':'green'; return `<div class="card-editor"><div style="display:flex;justify-content:space-between;gap:12px"><strong>${esc(b.category)}</strong><span class="pill">${Math.round(r*100)}%</span></div><div class="grid grid-3 section-space"><label><span>Categoria</span>${textInput(`budgets.${i}.category`, b.category)}</label><label><span>Limite</span>${numInput(`budgets.${i}.limit`, b.limit)}</label><label><span>Gastado</span>${numInput(`budgets.${i}.spent`, b.spent)}</label></div><div class="track section-space"><div class="fill" style="width:${Math.min(100,r*100)}%;background:var(--${tone})"></div></div></div>`}).join('')}</div></div>`;
      }

      function renderReports(m) {
        reports.innerHTML = pageTitle('Reportes', 'Graficos, historico mensual, exportacion CSV y reporte financiero.') +
          `<div class="grid grid-2 section-space">${barPanel('Flujo de dinero', [{n:'Ingreso',v:m.effectiveIncome},{n:'Fijos',v:m.fixed},{n:'Variables',v:m.variable},{n:'Deudas',v:m.cardMin+data.irs.monthly},{n:'Ahorro',v:m.savings},{n:'Libre',v:m.leftover}], 'blue')}${barPanel('Deuda por tarjeta', data.cards.map(c=>({n:c.name,v:c.balance})), 'red')}${barPanel('Suscripciones', data.expenses.filter(x=>x.category==='Suscripciones').map(x=>({n:x.name,v:x.amount})), 'blue')}${barPanel('Balance historico', data.history.map(h=>({n:h.month,v:h.leftover})), 'green')}</div>
          <div class="panel section-space"><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn primary" onclick="exportMovements()">${icons.Download} Exportar movimientos CSV</button><button class="btn primary" onclick="exportSummary()">${icons.Download} Exportar resumen CSV</button><button class="btn" onclick="downloadReport()">${icons.FileText} Descargar reporte</button><button class="btn ghost" onclick="saveMonth()">${icons.CheckCircle2} Guardar mes</button></div>
          <div class="table-wrap section-space"><table><thead><tr><th>Mes</th><th>Ingreso</th><th>Gastos</th><th>Ahorro</th><th>Sobrante</th><th>Deuda pagada</th><th>Mayor fuga</th><th>Nota</th></tr></thead><tbody>${data.history.map(h=>`<tr><td><strong>${h.month}</strong></td><td>${usd(h.income)}</td><td>${usd(h.expenses)}</td><td>${usd(h.savings)}</td><td>${usd(h.leftover)}</td><td>${usd(h.debtPaid)}</td><td>${esc(h.leak)}</td><td>${esc(h.note)}</td></tr>`).join('')}</tbody></table></div></div>`;
      }
      function renderAlerts(a, ins) {
        alerts.innerHTML = pageTitle('Centro de Alertas', 'Recordatorios 7 dias antes, 3 dias, 1 dia, mismo dia y pago vencido.') +
          `<div class="grid grid-2 section-space"><div class="panel"><h3>Alertas activas</h3><div class="section-space">${a.map(alertHtml).join('')}</div></div><div class="panel"><h3>Consejos automaticos</h3><div class="section-space">${ins.tips.map(t=>`<div class="alert"><div class="iconbox green">${icons.CheckCircle2}</div><div><strong>${esc(t)}</strong></div></div>`).join('')}</div></div></div>`;
      }
      function alertHtml(x) {
        return `<div class="alert"><div class="iconbox ${x[0]}">${icons[x[0] === 'green' ? 'CheckCircle2' : 'AlertTriangle']}</div><div><strong>${esc(x[1])}</strong><p class="muted small">${esc(x[2])}</p><span class="pill">${esc(x[3])}</span></div></div>`;
      }
      function renderSettings() {
        settings.innerHTML = pageTitle('Configuracion', 'Website con respaldo local y sincronizacion online opcional por Supabase en Vercel.') +
          `<div class="panel section-space"><div class="grid grid-2"><button class="btn primary" onclick="data.dark=!data.dark;save()">${icons.Moon} Cambiar modo claro/oscuro</button><button class="btn danger" onclick="if(confirm('Reiniciar datos de ejemplo?')){data=structuredClone(baseData);save()}">${icons.RefreshCcw} Restaurar ejemplo</button></div><p class="muted small section-space">Estado de guardado: <strong data-cloud-status>${cloudStatus}</strong>. Si configuras Supabase en Vercel, los cambios se guardan online; si no, se guardan solo en este navegador.</p><p class="muted small section-space">Para subirlo como website, sube la carpeta <strong>website</strong> completa. El archivo principal es <strong>index.html</strong>.</p></div>`;
      }

      function csv(rows) { return rows.map(r => r.map(v => `"${String(v ?? '').replaceAll('"','""')}"`).join(',')).join('\n'); }
      function download(name, content, type='text/csv') {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], {type})); a.download = name; a.click(); URL.revokeObjectURL(a.href);
      }
      function exportMovements() {
        download('movimientos-financieros.csv', csv([['Nombre','Categoria','Monto','Frecuencia','Mensual','Dia','Estado','Notas'], ...data.expenses.map(x=>[x.name,x.category,x.amount,freqLabels[x.frequency],monthly(x.amount,x.frequency).toFixed(2),x.dueDay,x.status,x.notes])]));
      }
      function exportSummary() {
        const m = calc();
        download('resumen-mensual.csv', csv([['Metrica','Valor'],['Ingreso del mes',m.effectiveIncome],['Ingreso estimado',data.income],['Entradas registradas',m.monthIncomes.length],['Gastos',m.total],['Ahorro',m.savings],['Sobrante',m.leftover],['Deuda tarjetas',m.cardDebt],['IRS mensual',data.irs.monthly]]));
      }
      function downloadReport() {
        const m = calc(), ins = insights(m);
        download('reporte-financiero.txt', `Reporte financiero mensual\nIngreso del mes: ${usd(m.effectiveIncome)}\nEntradas registradas: ${m.monthIncomes.length}\nGastos: ${usd(m.total)}\nAhorro: ${usd(m.savings)}\nSobrante: ${usd(m.leftover)}\nMayor fuga: ${m.leak.name}\n\nConsejos:\n${ins.tips.map(x=>'- '+x).join('\n')}`, 'text/plain');
      }
      function saveMonth() {
        const m = calc(), month = new Date().toISOString().slice(0,7);
        data.history = [{ month, income: m.effectiveIncome, expenses: m.total, savings: m.savings, leftover: m.leftover, debtPaid: m.cardRec + data.irs.monthly, leak: m.leak.name, note: `Guardado con ${m.monthIncomes.length} ingresos` }, ...data.history.filter(x=>x.month!==month)];
        save(); toast('Mes guardado en historico');
      }

      function render() {
        const m = calc(), a = alerts(m), ins = insights(m);
        document.body.classList.toggle('dark', data.dark);
        leftoverPill.textContent = `${usd(m.leftover)} libre`;
        alertsPill.textContent = `${a.length} alertas`;
        renderNav(); renderDashboard(m,a,ins); renderIncomes(m); renderMovements(); renderCalendar(); renderCards(m); renderIrs(m); renderBudget(); renderReports(m); renderAlerts(a,ins); renderSettings(); renderIcons(); renderCloudBadges(); go(active);
      }
      themeBtn.onclick = () => { data.dark = !data.dark; save(); };
      resetBtn.onclick = () => { if (confirm('Reiniciar datos de ejemplo?')) { data = structuredClone(baseData); save(); } };
      render();
      loadCloud();
    </script>
  </body>
</html>
